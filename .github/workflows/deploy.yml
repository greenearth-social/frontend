name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  # -----------------------------------------------------------------------
  # Deploy prod — auto after CI passes on main, gated by environment approval.
  # Hosting (live) + prod functions only + rules.
  # -----------------------------------------------------------------------
  deploy-prod:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      EXPECTED_APP_ORIGIN: https://greenearth-471522.web.app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: dist
          path: dist/

      - uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: functions-build
          path: functions/lib/

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci --omit=dev

      - name: Write prod database config
        run: |
          printf '{"firestoreDatabase":"greenearth-prod"}\n' > dist/config.json

      - name: Write functions .env from GitHub Variables
        env:
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          BLUESKY_OAUTH_CLIENT_KID: ${{ vars.BLUESKY_OAUTH_CLIENT_KID }}
          BLUESKY_OAUTH_PUBLIC_JWKS: ${{ vars.BLUESKY_OAUTH_PUBLIC_JWKS }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          test "$APP_ORIGIN" = "$EXPECTED_APP_ORIGIN"
          test -n "$BLUESKY_OAUTH_CLIENT_KID"
          test -n "$BLUESKY_OAUTH_PUBLIC_JWKS"
          test -n "$FIREBASE_SERVICE_ACCOUNT"
          node -e 'const value = JSON.parse(process.env.BLUESKY_OAUTH_PUBLIC_JWKS); if (!Array.isArray(value.keys) || value.keys.length === 0) process.exit(1)'
          printf 'APP_ORIGIN=%s\nBLUESKY_OAUTH_CLIENT_KID=%s\nBLUESKY_OAUTH_PUBLIC_JWKS=%s\n' \
            "$APP_ORIGIN" \
            "$BLUESKY_OAUTH_CLIENT_KID" \
            "$BLUESKY_OAUTH_PUBLIC_JWKS" \
            > functions/.env

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Verify production deployer and required APIs
        run: |
          deployer="$(node -e 'const fs = require("fs"); const value = JSON.parse(fs.readFileSync(process.env.GOOGLE_GHA_CREDS_PATH, "utf8")); process.stdout.write(value.client_email || "unknown")')"
          echo "Deployment identity: $deployer"
          for service in \
            firestore.googleapis.com \
            firebaserules.googleapis.com \
            cloudfunctions.googleapis.com \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            firebasehosting.googleapis.com
          do
            if ! gcloud services list \
                --project greenearth-471522 \
                --enabled \
                --filter="config.name=$service" \
                --format='value(config.name)' | grep -q "^$service$"; then
              echo "Required API not enabled: $service" >&2
              exit 1
            fi
          done

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Deploy Hosting + prod Functions + Firestore rules
        run: |
          sed -i 's/__CLOUD_RUN_SERVICE__/greenearth-api-prod/' firebase.json
          firebase deploy \
            --only hosting,functions:authBluesky,functions:oauthCallback,functions:oauthClientMetadata,functions:oauthJwks,firestore:rules \
            --project greenearth-471522 \
            --non-interactive \
            --force
