name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # CI — lint, typecheck, unit tests, E2E, build. Runs on every push and PR.
  # -----------------------------------------------------------------------
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install functions dependencies (needed for lint)
        working-directory: functions
        run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Build frontend
        run: npm run build

      - name: Build functions
        working-directory: functions
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: functions-build
          path: |
            functions/lib/
            functions/package.json
            functions/node_modules/
          retention-days: 1

  # -----------------------------------------------------------------------
  # Deploy stage — PR preview channel. Hosting only (no functions/rules).
  # -----------------------------------------------------------------------
  deploy-stage:
    if: github.event_name == 'pull_request'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Write stage database config
        run: |
          printf '{"firestoreDatabase":"greenearth-stage"}\n' > dist/config.json

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Hosting (stage preview channel)
        run: |
          firebase hosting:channel:deploy stage \
            --project greenearth-471522 \
            --only hosting \
            --non-interactive

  # -----------------------------------------------------------------------
  # Deploy prod — merge to main only. Hosting (live) + functions + rules.
  # -----------------------------------------------------------------------
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: functions-build
          path: functions/

      - name: Write prod database config
        run: |
          printf '{"firestoreDatabase":"greenearth-prod"}\n' > dist/config.json

      - name: Write functions .env from GitHub Variables
        run: |
          cat > functions/.env << 'ENVEOF'
          APP_ORIGIN=${{ vars.APP_ORIGIN }}
          BLUESKY_OAUTH_CLIENT_KID=${{ vars.BLUESKY_OAUTH_CLIENT_KID }}
          BLUESKY_OAUTH_PUBLIC_JWKS=${{ vars.BLUESKY_OAUTH_PUBLIC_JWKS }}
          OAUTH_STATE_ENCRYPTION_KEY=${{ secrets.OAUTH_STATE_ENCRYPTION_KEY }}
          ENVEOF

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Hosting (live channel)
        run: |
          firebase hosting:channel:deploy live \
            --project greenearth-471522 \
            --only hosting \
            --non-interactive

      - name: Deploy Functions + Firestore rules
        run: |
          firebase deploy \
            --only functions,firestore:rules \
            --project greenearth-471522 \
            --non-interactive \
            --force
